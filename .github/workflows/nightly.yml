name: .NET Core

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET 10
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Install dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --configuration Release --no-restore
    - name: Test
      run: dotnet test --no-restore --verbosity normal --filter TestCategory\!=Manual
    - name: Publish
      run: |
        dotnet publish ./Montage.Weiss.Tools/Montage.Weiss.Tools.csproj -c Release -r win-x64 -o publish -p:PublishSingleFile=true --self-contained true -p:IncludeNativeLibrariesForSelfExtract=true --version-suffix 'rc${{ github.run_number }}'
        dotnet publish ./Montage.Weiss.Tools/Montage.Weiss.Tools.csproj -c Release -r linux-x64 -o publish -p:PublishSingleFile=true  -p:PublishTrimmed=false  --self-contained true -p:IncludeNativeLibrariesForSelfExtract=true --version-suffix 'rc${{ github.run_number }}'
        dotnet publish ./Montage.Weiss.Tools.GUI/Montage.Weiss.Tools.GUI.csproj -c Release -f net10.0-windows -r win-x64 -o publish -p:PublishSingleFile=true --self-contained true -p:IncludeNativeLibrariesForSelfExtract=true --version-suffix 'rc${{ github.run_number }}'
        dotnet publish ./Montage.Weiss.Tools.GUI/Montage.Weiss.Tools.GUI.csproj -c Release -f net10.0 -r linux-x64 -o publish -p:PublishSingleFile=true  -p:PublishTrimmed=false  --self-contained true -p:IncludeNativeLibrariesForSelfExtract=true --version-suffix 'rc${{ github.run_number }}'
    - name: Upload Artifact (wstools win-x64)
      if: ${{ !env.ACT }}
      uses: actions/upload-artifact@v6
      with:
        name: wstools-win-x64
        path: publish/wstools.exe
        if-no-files-found: warn
    - name: Upload Artifact (wstools linux-x64)
      if: ${{ !env.ACT }}
      uses: actions/upload-artifact@v6
      with:
        name: wstools-linux-x64
        path: publish/wstools
        if-no-files-found: warn
    - name: Upload Artifact (wsm-gui win-x64)
      if: ${{ !env.ACT }}
      uses: actions/upload-artifact@v6
      with:
        name: wsm-gui-win-x64
        path: publish/wsm-gui.exe
        if-no-files-found: warn
    - name: Upload Artifact (wsm-gui linux-x64)
      if: ${{ !env.ACT }}
      uses: actions/upload-artifact@v6
      with:
        name: wsm-gui-linux-x64
        path: publish/wsm-gui
        if-no-files-found: warn
    - name: Attach Issues to Last Milestone
      if: github.event_name == 'push'
      uses: actions/github-script@v7
      with:
        script: |
          // Extract issue numbers from commit messages using GitHub keywords
          // Keywords: close, closes, closed, fix, fixes, fixed, resolve, resolves, resolved
          // Docs: https://docs.github.com/en/get-started/writing-on-github/working-with-commit-messages/linking-a-pull-request-to-an-issue#linking-a-pull-request-to-an-issue-using-a-keyword
          const issueRegex = /(?:close[sd]?|fix(?:e[sd])?|resolve[d]?)\s+#(\d+)/gi;
          const issueNumbers = new Set();

          // Get commits from the push event (docs: https://docs.github.com/en/actions/writing-workflows/choosing-when-your-workflow-runs/events-that-trigger-workflows#push)
          const commits = context.payload.commits || [];
          if (commits.length === 0) {
            console.log('No commits found in push event');
            return;
          }

          // Parse all commit messages for issue references
          for (const commit of commits) {
            const message = commit.message;
            let match;
            while ((match = issueRegex.exec(message)) !== null) {
              issueNumbers.add(parseInt(match[1], 10));
            }
            issueRegex.lastIndex = 0; // Reset regex for next commit
          }

          if (issueNumbers.size === 0) {
            console.log('No issues referenced in commit messages');
            return;
          }

          console.log(`Issues referenced in commits: ${[...issueNumbers].join(', ')}`);

          // Get the last open milestone (most recent due date)
          // Docs: https://docs.github.com/rest/issues/milestones#list-milestones
          const milestones = await github.rest.issues.listMilestones({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            sort: 'due_on',
            direction: 'desc',
            per_page: 1
          });

          let milestone;
          if (milestones.data.length > 0) {
            milestone = milestones.data[0];
            console.log(`Using existing milestone: ${milestone.title} (#${milestone.number})`);
          } else {
            // Create new milestone if none exist (matches 'Nightly' as default)
            // Referenced milestone action: https://github.com/marketplace/actions/milestone-action (create action)
            const newMilestone = await github.rest.issues.createMilestone({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Nightly',
              description: 'Auto-created by nightly workflow'
            });
            milestone = newMilestone.data;
            console.log(`Created new milestone: ${milestone.title} (#${milestone.number})`);
          }

          // Attach referenced issues to the milestone
          // Docs: https://docs.github.com/rest/issues/issues#update-an-issue
          for (const issueNumber of issueNumbers) {
            try {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                milestone: milestone.number
              });
              console.log(`Attached issue #${issueNumber} to milestone ${milestone.title}`);
            } catch (error) {
              console.log(`Failed to attach issue #${issueNumber}: ${error.message}`);
            }
          }
